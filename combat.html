<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Combat</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="combat-container">

    <!-- TURN BAR -->
    <div class="turn-bar">
        <div class="turn-order">
            <div class="turn">Character 1</div>
            <div class="turn enemy">Enemy 1</div>
            <div class="turn">Character 2</div>
            <div class="turn enemy">Enemy 2</div>
        </div>
    </div>


    <!-- BATTLEFIELD -->
    <div class="battlefield">

        <!-- PARTY -->
        <div class="party-side">
            <div class="portrait"></div>
            <div class="portrait"></div>
            <div class="portrait"></div>
        </div>

        <!-- ENEMIES -->
        <div class="enemy-side">
            <div class="portrait enemy"></div>
            <div class="portrait enemy"></div>
            <div class="portrait enemy"></div>
            <div class="portrait enemy"></div>
        </div>

    </div>


    <!-- BOTTOM SECTION -->
    <div class="bottom-ui">

        <!-- CHARACTER PANEL -->
        <div class="character-panel">

            <h2>Character Name</h2>

            <div class="hp-bar">
                <div class="hp-fill"></div>
            </div>

            <div class="actions">

                <h3>Actions</h3>

                <div class="button-row">

                    <div class="tooltip">
                        <button>Action 1</button>
                    </div>

                    <div class="tooltip">
                        <button>Action 2</button>
                    </div>

                    <div class="tooltip">
                        <button>Action 3</button>
                    </div>

                    <div class="tooltip">
                        <button>Action 4</button>
                    </div>

                </div>


                <h3>Items</h3>

                <div class="button-row">

                    <div class="tooltip">
                        <button>Item 1 (x2)</button>
                    </div>

                    <div class="tooltip">
                        <button>Item 2 (x1)</button>
                    </div>

                    <div class="tooltip">
                        <button>Item 3 (x5)</button>
                    </div>

                    <div class="tooltip">
                        <button>Item 4 (x3)</button>
                    </div>

                </div>

            </div>

        </div>


        <!-- BATTLE LOG -->
        <div class="battle-log">

            <h3>Battle Log</h3>

            <div class="log-content">
                <p>Barbarian attacks Goblin for 12 damage.</p>
                <p>Goblin retaliates for 6 damage.</p>
                <p>Bard inspires the party.</p>
                <p>Wizard casts Spark.</p>
                <p>Goblin takes 9 damage.</p>
                <p>Another enemy approaches...</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
