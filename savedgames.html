<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Saved Games</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="save-page">

    <h1 class="page-title">Saved Games</h1>

    <div class="save-container">

        <!-- SAVE SLOT 1 -->
        <div class="save-slot">

            <div class="save-info">
                <h2>Campaign 1 - Chapter 1</h2>
            </div>

            <div class="save-actions">
                <button>Load Game</button>
                <button class="delete-btn">Delete</button>
            </div>

        </div>


        <!-- SAVE SLOT 2 -->
        <div class="save-slot empty">

            <div class="save-info">
                <h2>-- No saved state --</h2>
            </div>

        </div>


        <!-- SAVE SLOT 3 -->
        <div class="save-slot empty">

            <div class="save-info">
                <h2>-- No saved state --</h2>
            </div>

        </div>

    </div>

</div>

</body>
</html>
